extend type Query {
  author(id: ID!): Author!
  authors(
    filter: AuthorFilter
    first: Int
    after: String
    last: Int
    before: String
  ): AuthorsConnection!
}

extend type Mutation {
  saveAuthor(input: SaveAuthorInput!): SaveAuthorResult!
  deleteAuthor(id: ID!): EmptyResult
}

type Author {
  id: ID!
  firstName: String!
  lastName: String
  books: [Book!]!
}

input SaveAuthorInput {
  id: ID
  firstName: String
  lastName: String
}

type SaveAuthorResult {
  author: Author!
}

type AuthorsConnection {
  edges: [AuthorsEdge!]!
  nodes: [Author!]!
  pageInfo: PageInfo!
}

type AuthorsEdge {
  node: Author!
  cursor: String!
}

input AuthorFilter {
  id: [ID!]
  firstName: [String!]
  lastName: [String!]
  createdAt: [DateTime!]
  updatedAt: [DateTime!]
}
