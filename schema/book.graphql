extend type Query {
  books: [Book!]!
  book(id: ID!): Book!
}

extend type Mutation {
  saveBook(input: SaveBookInput!): SaveBookResult!
}

type Book {
  id: ID!
  title: String!
  author: Author!
  reviews(first: Int): [BookReview!]!
}

input SaveBookInput {
  id: ID
  title: String
  authorId: ID
}

type SaveBookResult {
  book: Book!
}

type BooksConnection {
  edges: [BooksEdge!]!
  nodes: [Book!]!
  pageInfo: PageInfo!
}

type BooksEdge {
  node: Book!
  cursor: String!
}

input BookFilter {
  id: [ID!]
  title: [String!]
  createdAt: [DateTime!]
  updatedAt: [DateTime!]
  authorId: [ID!]
}
