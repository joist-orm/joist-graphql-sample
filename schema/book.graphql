extend type Query {
  books: [Book!]!
}

extend type Mutation {
  saveBook(input: SaveBookInput!): SaveBookResult!
}

type Book {
  id: ID!
  title: String!
  author: Author!
  reviews(first: Int): [BookReview!]!
}

input SaveBookInput {
  id: ID
  title: String
  authorId: ID
}

type SaveBookResult {
  book: Book!
}
