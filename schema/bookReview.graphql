extend type Query {
  bookReview(id: ID!): BookReview!
  bookReviews(
    filter: BookReviewFilter
    first: Int
    after: String
    last: Int
    before: String
  ): BookReviewsConnection!
}

extend type Mutation {
  saveBookReview(input: SaveBookReviewInput!): SaveBookReviewResult!
}

type BookReview {
  id: ID!
  rating: Int!
  book: Book!
}

input SaveBookReviewInput {
  id: ID
  rating: Int
  bookId: ID
}

type SaveBookReviewResult {
  bookReview: BookReview!
}

type BookReviewsConnection {
  edges: [BookReviewsEdge!]!
  nodes: [BookReview!]!
  pageInfo: PageInfo!
}

type BookReviewsEdge {
  node: BookReview!
  cursor: String!
}

input BookReviewFilter {
  id: [ID!]
  rating: [Int!]
  createdAt: [DateTime!]
  updatedAt: [DateTime!]
  bookId: [ID!]
}
